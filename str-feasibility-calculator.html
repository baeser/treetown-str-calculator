<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STR Feasibility Calculator - Latin America Beach Markets</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.3/jspdf.plugin.autotable.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    .results-scroll { scrollbar-width: thin; scrollbar-color: #475569 transparent; }
    .results-scroll::-webkit-scrollbar { width: 5px; }
    .results-scroll::-webkit-scrollbar-track { background: transparent; }
    .results-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useMemo } = React;

    // Defined outside main component to prevent re-creation on each render
    const InputGroup = ({ label, value, onChange, prefix, suffix, min, max, step = 1, tooltip }) => (
      <div className="mb-4">
        <label className="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">
          {label}
          {tooltip && (
            <span className="ml-1.5 text-amber-400 cursor-help" title={tooltip}>ⓘ</span>
          )}
        </label>
        <div className="relative">
          {prefix && (
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 font-medium">{prefix}</span>
          )}
          <input
            type="number"
            value={value}
            onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
            min={min}
            max={max}
            step={step}
            className={`w-full bg-slate-800/50 border border-slate-700 rounded-lg py-2.5 text-white font-medium focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all ${prefix ? 'pl-8' : 'pl-3'} ${suffix ? 'pr-12' : 'pr-3'}`}
          />
          {suffix && (
            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 font-medium">{suffix}</span>
          )}
        </div>
      </div>
    );

    const MetricCard = ({ label, value, subtext, highlight, warning }) => (
      <div className={`p-4 rounded-xl border ${highlight ? 'bg-gradient-to-br from-amber-500/20 to-orange-500/10 border-amber-500/30' : warning ? 'bg-gradient-to-br from-red-500/20 to-rose-500/10 border-red-500/30' : 'bg-slate-800/30 border-slate-700/50'}`}>
        <div className="text-xs font-medium text-slate-400 uppercase tracking-wider mb-1">{label}</div>
        <div className={`text-2xl font-bold ${highlight ? 'text-amber-400' : warning ? 'text-red-400' : 'text-white'}`}>{value}</div>
        {subtext && <div className="text-xs text-slate-500 mt-1">{subtext}</div>}
      </div>
    );

    const Tab = ({ id, label, active, onClick }) => (
      <button
        onClick={() => onClick(id)}
        className={`px-4 py-2.5 text-sm font-medium rounded-lg transition-all ${active ? 'bg-amber-500 text-slate-900' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}
      >
        {label}
      </button>
    );

    // Region presets with market-appropriate defaults
    const REGION_PRESETS = {
      rivieraMaya: {
        label: 'Riviera Maya, Mexico',
        subtitle: 'Riviera Maya & Mexico Caribbean Coast',
        purchasePrice: 350000, downPaymentPercent: 30, interestRate: 7.5, loanTermYears: 15,
        closingCostPercent: 5, furnishingCost: 15000,
        highSeasonNightlyRate: 180, lowSeasonNightlyRate: 110, shoulderSeasonNightlyRate: 140,
        highSeasonOccupancy: 75, lowSeasonOccupancy: 45, shoulderSeasonOccupancy: 60,
        highSeasonMonths: 4, lowSeasonMonths: 3, personalUseDays: 14,
        propertyMgmtPercent: 20, cleaningFeePerTurn: 65, avgStayLength: 4.5, platformFeePercent: 3,
        hoaMonthly: 350, utilitiesMonthly: 180, insuranceAnnual: 1800,
        propertyTaxPercent: 0.15, maintenancePercent: 1.5, permitsAnnual: 400, marketingAnnual: 600,
        landValuePercent: 20,
        highSeasonLabel: 'Dec-Mar peak tourism',
        shoulderSeasonLabel: 'Apr-May & Nov transition',
        lowSeasonLabel: 'Jun-Oct rainy/hurricane season',
        seasonalityNote: 'The Riviera Maya has distinct seasons driven by US/Canadian snowbird demand and hurricane season.',
        closingCostTooltip: 'Mexico typically 4-6% including notary, taxes, and legal fees',
        interestRateTooltip: 'Mexico financing typically 7-10%',
        propertyTaxTooltip: 'Mexico: ~0.1-0.2% of assessed value (Predial)',
        propertyTaxLabel: 'Property Tax (Predial)',
        mgmtTooltip: 'Mexico full-service: 15-25%. Basic: 10-15%',
        hoaTooltip: 'Gated communities in Riviera Maya: $200-500/mo typical',
        furnishingTooltip: '$9-15k typical for 2BR vacation rental in Riviera Maya',
        landValueTooltip: 'Land typically 15-25% of purchase price in Riviera Maya',
        marketTypes: [
          { value: 'consolidated', label: 'Consolidated (Akumal, Puerto Aventuras, Playacar)' },
          { value: 'emerging', label: 'Emerging (Tulum Centro, New Developments)' },
          { value: 'speculative', label: 'Speculative (Remote/Pre-construction)' }
        ]
      },
      cabo: {
        label: 'Los Cabos, Mexico',
        subtitle: 'Cabo San Lucas & San Jose del Cabo',
        purchasePrice: 450000, downPaymentPercent: 30, interestRate: 7.5, loanTermYears: 15,
        closingCostPercent: 5, furnishingCost: 18000,
        highSeasonNightlyRate: 250, lowSeasonNightlyRate: 140, shoulderSeasonNightlyRate: 180,
        highSeasonOccupancy: 80, lowSeasonOccupancy: 52, shoulderSeasonOccupancy: 60,
        highSeasonMonths: 4, lowSeasonMonths: 3, personalUseDays: 14,
        propertyMgmtPercent: 22, cleaningFeePerTurn: 80, avgStayLength: 4, platformFeePercent: 3,
        hoaMonthly: 450, utilitiesMonthly: 220, insuranceAnnual: 2200,
        propertyTaxPercent: 0.15, maintenancePercent: 1.5, permitsAnnual: 500, marketingAnnual: 800,
        landValuePercent: 25,
        highSeasonLabel: 'Dec-Mar US peak + spring break',
        shoulderSeasonLabel: 'Apr-May & Nov shoulder',
        lowSeasonLabel: 'Jun-Oct hurricane season / extreme heat',
        seasonalityNote: 'Los Cabos has strong US demand year-round with peak winter/spring break seasons. Higher ADRs than most Mexico markets.',
        closingCostTooltip: 'Mexico typically 4-6% including notary, taxes, and legal fees',
        interestRateTooltip: 'Mexico financing typically 7-10%',
        propertyTaxTooltip: 'Mexico: ~0.1-0.2% of assessed value (Predial)',
        propertyTaxLabel: 'Property Tax (Predial)',
        mgmtTooltip: 'Cabo full-service: 18-25%. Luxury properties can be higher',
        hoaTooltip: 'Resort-style HOAs in Cabo: $300-700/mo typical. Luxury can exceed $1k',
        furnishingTooltip: '$12-20k typical for 2BR in Cabo. Higher-end finishes expected by guests',
        landValueTooltip: 'Land typically 20-30% of purchase price in Los Cabos',
        marketTypes: [
          { value: 'consolidated', label: 'Consolidated (Cabo Corridor, Medano Beach, SJD Hotel Zone)' },
          { value: 'emerging', label: 'Emerging (East Cape, Pacific Side, Todo Santos)' },
          { value: 'speculative', label: 'Speculative (Remote/Pre-construction)' }
        ]
      },
      costaRica: {
        label: 'Guanacaste, Costa Rica',
        subtitle: 'Playa Hermosa, Playas del Coco & Gold Coast',
        purchasePrice: 320000, downPaymentPercent: 35, interestRate: 8.5, loanTermYears: 15,
        closingCostPercent: 4, furnishingCost: 14000,
        highSeasonNightlyRate: 200, lowSeasonNightlyRate: 110, shoulderSeasonNightlyRate: 145,
        highSeasonOccupancy: 75, lowSeasonOccupancy: 35, shoulderSeasonOccupancy: 55,
        highSeasonMonths: 4, lowSeasonMonths: 4, personalUseDays: 14,
        propertyMgmtPercent: 22, cleaningFeePerTurn: 60, avgStayLength: 5, platformFeePercent: 3,
        hoaMonthly: 250, utilitiesMonthly: 160, insuranceAnnual: 1500,
        propertyTaxPercent: 0.25, maintenancePercent: 2.0, permitsAnnual: 350, marketingAnnual: 600,
        landValuePercent: 30,
        highSeasonLabel: 'Dec-Mar dry season (verano)',
        shoulderSeasonLabel: 'Apr-May & Nov transition months',
        lowSeasonLabel: 'Jun-Oct green/rainy season',
        seasonalityNote: 'Guanacaste has a pronounced dry vs. green season split. Dry season demand is strong; green season drops significantly but offers lower competition.',
        closingCostTooltip: 'Costa Rica typically 3.5-5% including transfer tax, legal, and notary',
        interestRateTooltip: 'Costa Rica financing 8-12% (USD loans). Many buyers finance through US equity or pay cash',
        propertyTaxTooltip: 'Costa Rica: ~0.25% of registered value annually',
        propertyTaxLabel: 'Property Tax (Impuesto Bienes Inmuebles)',
        mgmtTooltip: 'Costa Rica full-service: 20-30%. Bilingual managers command premium',
        hoaTooltip: 'HOAs in Guanacaste: $150-400/mo. Standalone homes may have none',
        furnishingTooltip: '$10-16k typical for 2BR. Import costs can add up in Costa Rica',
        landValueTooltip: 'Land typically 25-35% of purchase price in Guanacaste',
        marketTypes: [
          { value: 'consolidated', label: 'Consolidated (Playas del Coco, Playa Hermosa, Ocotal)' },
          { value: 'emerging', label: 'Emerging (Playa Danta, Bahia Pez Vela, Matapalo)' },
          { value: 'speculative', label: 'Speculative (Remote/Pre-construction)' }
        ]
      }
    };

    const STRFeasibilityCalculator = () => {
      const [region, setRegion] = useState('rivieraMaya');

      // Purchase & Financing
      const [purchasePrice, setPurchasePrice] = useState(350000);
      const [downPaymentPercent, setDownPaymentPercent] = useState(30);
      const [interestRate, setInterestRate] = useState(7.5);
      const [loanTermYears, setLoanTermYears] = useState(15);
      const [closingCostPercent, setClosingCostPercent] = useState(5);
      const [furnishingCost, setFurnishingCost] = useState(15000);

      // Property Details
      const [marketType, setMarketType] = useState('consolidated');

      // Revenue - Seasonality Model
      const [highSeasonNightlyRate, setHighSeasonNightlyRate] = useState(180);
      const [lowSeasonNightlyRate, setLowSeasonNightlyRate] = useState(110);
      const [shoulderSeasonNightlyRate, setShoulderSeasonNightlyRate] = useState(140);
      const [highSeasonOccupancy, setHighSeasonOccupancy] = useState(75);
      const [lowSeasonOccupancy, setLowSeasonOccupancy] = useState(45);
      const [shoulderSeasonOccupancy, setShoulderSeasonOccupancy] = useState(60);
      const [highSeasonMonths, setHighSeasonMonths] = useState(4);
      const [lowSeasonMonths, setLowSeasonMonths] = useState(3);
      const [personalUseDays, setPersonalUseDays] = useState(14);

      // Operating Expenses
      const [propertyMgmtPercent, setPropertyMgmtPercent] = useState(20);
      const [cleaningFeePerTurn, setCleaningFeePerTurn] = useState(65);
      const [avgStayLength, setAvgStayLength] = useState(4.5);
      const [platformFeePercent, setPlatformFeePercent] = useState(3);
      const [hoaMonthly, setHoaMonthly] = useState(350);
      const [utilitiesMonthly, setUtilitiesMonthly] = useState(180);
      const [insuranceAnnual, setInsuranceAnnual] = useState(1800);
      const [propertyTaxPercent, setPropertyTaxPercent] = useState(0.15);
      const [maintenancePercent, setMaintenancePercent] = useState(1.5);
      const [permitsAnnual, setPermitsAnnual] = useState(400);
      const [marketingAnnual, setMarketingAnnual] = useState(600);

      const [activeTab, setActiveTab] = useState('purchase');

      // Tax Strategy
      const [landValuePercent, setLandValuePercent] = useState(20);
      const [costSegPercent, setCostSegPercent] = useState(30);
      const [bonusDepreciationRate, setBonusDepreciationRate] = useState(100);
      const [marginalTaxRate, setMarginalTaxRate] = useState(32);
      const [materialParticipation, setMaterialParticipation] = useState(true);
      const [costSegStudyFee, setCostSegStudyFee] = useState(5000);

      const preset = REGION_PRESETS[region];

      const applyRegionPreset = (regionKey) => {
        if (region !== regionKey && !window.confirm('Switch to ' + REGION_PRESETS[regionKey].label + '? This will reset all inputs to that market\'s defaults.')) {
          return;
        }
        const p = REGION_PRESETS[regionKey];
        setRegion(regionKey);
        setPurchasePrice(p.purchasePrice);
        setDownPaymentPercent(p.downPaymentPercent);
        setInterestRate(p.interestRate);
        setLoanTermYears(p.loanTermYears);
        setClosingCostPercent(p.closingCostPercent);
        setFurnishingCost(p.furnishingCost);
        setHighSeasonNightlyRate(p.highSeasonNightlyRate);
        setLowSeasonNightlyRate(p.lowSeasonNightlyRate);
        setShoulderSeasonNightlyRate(p.shoulderSeasonNightlyRate);
        setHighSeasonOccupancy(p.highSeasonOccupancy);
        setLowSeasonOccupancy(p.lowSeasonOccupancy);
        setShoulderSeasonOccupancy(p.shoulderSeasonOccupancy);
        setHighSeasonMonths(p.highSeasonMonths);
        setLowSeasonMonths(p.lowSeasonMonths);
        setPersonalUseDays(p.personalUseDays);
        setPropertyMgmtPercent(p.propertyMgmtPercent);
        setCleaningFeePerTurn(p.cleaningFeePerTurn);
        setAvgStayLength(p.avgStayLength);
        setPlatformFeePercent(p.platformFeePercent);
        setHoaMonthly(p.hoaMonthly);
        setUtilitiesMonthly(p.utilitiesMonthly);
        setInsuranceAnnual(p.insuranceAnnual);
        setPropertyTaxPercent(p.propertyTaxPercent);
        setMaintenancePercent(p.maintenancePercent);
        setPermitsAnnual(p.permitsAnnual);
        setMarketingAnnual(p.marketingAnnual);
        setLandValuePercent(p.landValuePercent);
        setMarketType('consolidated');
      };
      
      const calculations = useMemo(() => {
        // Financing calculations
        const downPayment = purchasePrice * (downPaymentPercent / 100);
        const loanAmount = purchasePrice - downPayment;
        const closingCosts = purchasePrice * (closingCostPercent / 100);
        const totalCashInvested = downPayment + closingCosts + furnishingCost;
        
        // Monthly mortgage payment (P&I)
        const monthlyRate = (interestRate / 100) / 12;
        const numPayments = loanTermYears * 12;
        const monthlyMortgage = loanAmount > 0 
          ? (loanAmount * monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / 
            (Math.pow(1 + monthlyRate, numPayments) - 1)
          : 0;
        const annualDebtService = monthlyMortgage * 12;
        
        // Revenue calculations with seasonality
        const shoulderSeasonMonths = 12 - highSeasonMonths - lowSeasonMonths;
        const availableDays = 365 - personalUseDays;
        
        const highSeasonDays = (highSeasonMonths / 12) * availableDays;
        const lowSeasonDays = (lowSeasonMonths / 12) * availableDays;
        const shoulderSeasonDays = (shoulderSeasonMonths / 12) * availableDays;
        
        const highSeasonRevenue = highSeasonDays * (highSeasonOccupancy / 100) * highSeasonNightlyRate;
        const lowSeasonRevenue = lowSeasonDays * (lowSeasonOccupancy / 100) * lowSeasonNightlyRate;
        const shoulderSeasonRevenue = shoulderSeasonDays * (shoulderSeasonOccupancy / 100) * shoulderSeasonNightlyRate;
        
        const grossRentalIncome = highSeasonRevenue + lowSeasonRevenue + shoulderSeasonRevenue;
        
        // Calculate nights booked for expense calculations
        const totalNightsBooked = 
          (highSeasonDays * highSeasonOccupancy / 100) +
          (lowSeasonDays * lowSeasonOccupancy / 100) +
          (shoulderSeasonDays * shoulderSeasonOccupancy / 100);
        
        const blendedOccupancy = (totalNightsBooked / availableDays) * 100;
        const numberOfTurnovers = totalNightsBooked / avgStayLength;
        
        // Operating expenses
        const propertyManagement = grossRentalIncome * (propertyMgmtPercent / 100);
        const totalCleaningCost = numberOfTurnovers * cleaningFeePerTurn;
        const platformFees = grossRentalIncome * (platformFeePercent / 100);
        const hoaAnnual = hoaMonthly * 12;
        const utilitiesAnnual = utilitiesMonthly * 12;
        const propertyTax = purchasePrice * (propertyTaxPercent / 100);
        const maintenanceReserve = purchasePrice * (maintenancePercent / 100);
        
        const totalOperatingExpenses = 
          propertyManagement + 
          totalCleaningCost + 
          platformFees + 
          hoaAnnual + 
          utilitiesAnnual + 
          insuranceAnnual + 
          propertyTax + 
          maintenanceReserve + 
          permitsAnnual + 
          marketingAnnual;
        
        // Net Operating Income (NOI) - before debt service
        const noi = grossRentalIncome - totalOperatingExpenses;
        
        // Cash Flow - after debt service
        const annualCashFlow = noi - annualDebtService;
        const monthlyCashFlow = annualCashFlow / 12;
        
        // ROI Metrics
        const capRate = (noi / purchasePrice) * 100;
        const cashOnCash = totalCashInvested > 0 ? (annualCashFlow / totalCashInvested) * 100 : 0;
        const grossYield = (grossRentalIncome / purchasePrice) * 100;
        const netYield = (noi / purchasePrice) * 100;
        
        // Expense ratio
        const expenseRatio = (totalOperatingExpenses / grossRentalIncome) * 100;
        
        // Break-even analysis
        const breakEvenOccupancy = totalOperatingExpenses > 0 
          ? ((totalOperatingExpenses + annualDebtService) / grossRentalIncome) * blendedOccupancy
          : 0;
        
        // Market stability adjustment
        const stabilityMultiplier = marketType === 'consolidated' ? 1.0 : 
                                   marketType === 'emerging' ? 0.9 : 0.75;
        const adjustedCashFlow = annualCashFlow * stabilityMultiplier;
        
        // TAX STRATEGY CALCULATIONS
        const landValue = purchasePrice * (landValuePercent / 100);
        const buildingValue = purchasePrice - landValue;
        const closingCostsAddedToBasis = closingCosts * 0.5; // Conservative: ~50% of closing costs add to basis
        const depreciableBasis = buildingValue + furnishingCost + closingCostsAddedToBasis;
        
        // Cost Segregation
        const costSegEligibleAmount = depreciableBasis * (costSegPercent / 100);
        const year1BonusDepreciation = costSegEligibleAmount * (bonusDepreciationRate / 100);
        const remainingBasisAfterBonus = depreciableBasis - year1BonusDepreciation;
        
        // Standard 27.5 year depreciation on remaining basis
        const annualStraightLineDepreciation = remainingBasisAfterBonus / 27.5;
        
        // Year 1 total depreciation (bonus + partial straight-line)
        const year1TotalDepreciation = year1BonusDepreciation + annualStraightLineDepreciation;
        
        // Years 2+ depreciation (just straight-line)
        const ongoingAnnualDepreciation = annualStraightLineDepreciation;
        
        // Paper profit/loss (for tax purposes)
        const year1PaperIncome = annualCashFlow - year1TotalDepreciation;
        const ongoingPaperIncome = annualCashFlow - ongoingAnnualDepreciation;
        
        // Tax impact (only applies if material participation for W-2 offset)
        const year1TaxSavings = materialParticipation && year1PaperIncome < 0 
          ? Math.abs(year1PaperIncome) * (marginalTaxRate / 100)
          : 0;
        const ongoingTaxSavings = materialParticipation && ongoingPaperIncome < 0
          ? Math.abs(ongoingPaperIncome) * (marginalTaxRate / 100)
          : 0;
        
        // Effective returns (cash flow + tax savings)
        const year1EffectiveCashFlow = annualCashFlow + year1TaxSavings - costSegStudyFee;
        const ongoingEffectiveCashFlow = annualCashFlow + ongoingTaxSavings;
        
        // Effective Cash-on-Cash with tax benefits
        const year1EffectiveCoCReturn = totalCashInvested > 0 
          ? (year1EffectiveCashFlow / totalCashInvested) * 100 : 0;
        const ongoingEffectiveCoCReturn = totalCashInvested > 0
          ? (ongoingEffectiveCashFlow / totalCashInvested) * 100 : 0;
        
        return {
          downPayment,
          loanAmount,
          closingCosts,
          totalCashInvested,
          monthlyMortgage,
          annualDebtService,
          grossRentalIncome,
          highSeasonRevenue,
          lowSeasonRevenue,
          shoulderSeasonRevenue,
          totalNightsBooked,
          blendedOccupancy,
          numberOfTurnovers,
          propertyManagement,
          totalCleaningCost,
          platformFees,
          hoaAnnual,
          utilitiesAnnual,
          propertyTax,
          maintenanceReserve,
          totalOperatingExpenses,
          expenseRatio,
          noi,
          annualCashFlow,
          monthlyCashFlow,
          capRate,
          cashOnCash,
          grossYield,
          netYield,
          breakEvenOccupancy,
          adjustedCashFlow,
          stabilityMultiplier,
          // Tax strategy
          landValue,
          buildingValue,
          closingCostsAddedToBasis,
          depreciableBasis,
          costSegEligibleAmount,
          year1BonusDepreciation,
          remainingBasisAfterBonus,
          annualStraightLineDepreciation,
          year1TotalDepreciation,
          ongoingAnnualDepreciation,
          year1PaperIncome,
          ongoingPaperIncome,
          year1TaxSavings,
          ongoingTaxSavings,
          year1EffectiveCashFlow,
          ongoingEffectiveCashFlow,
          year1EffectiveCoCReturn,
          ongoingEffectiveCoCReturn
        };
      }, [
        purchasePrice, downPaymentPercent, interestRate, loanTermYears, closingCostPercent, furnishingCost,
        highSeasonNightlyRate, lowSeasonNightlyRate, shoulderSeasonNightlyRate,
        highSeasonOccupancy, lowSeasonOccupancy, shoulderSeasonOccupancy,
        highSeasonMonths, lowSeasonMonths, personalUseDays,
        propertyMgmtPercent, cleaningFeePerTurn, avgStayLength, platformFeePercent,
        hoaMonthly, utilitiesMonthly, insuranceAnnual, propertyTaxPercent,
        maintenancePercent, permitsAnnual, marketingAnnual, marketType,
        landValuePercent, costSegPercent, bonusDepreciationRate, marginalTaxRate, materialParticipation, costSegStudyFee
      ]);
      
      const formatCurrency = (val) => {
        return new Intl.NumberFormat('en-US', { 
          style: 'currency', 
          currency: 'USD',
          minimumFractionDigits: 0,
          maximumFractionDigits: 0
        }).format(val);
      };
      
      const formatPercent = (val) => val.toFixed(2) + '%';
      
      const getROIVerdict = (cashOnCash, capRate) => {
        if (cashOnCash >= 8 && capRate >= 6) return { text: 'Strong Investment', color: 'text-emerald-400', bg: 'bg-emerald-500/20' };
        if (cashOnCash >= 5 && capRate >= 4) return { text: 'Moderate Returns', color: 'text-amber-400', bg: 'bg-amber-500/20' };
        if (cashOnCash >= 0) return { text: 'Lifestyle Play', color: 'text-blue-400', bg: 'bg-blue-500/20' };
        return { text: 'Negative Cash Flow', color: 'text-red-400', bg: 'bg-red-500/20' };
      };
      
      const verdict = getROIVerdict(calculations.cashOnCash, calculations.capRate);

      const exportPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'letter');
        const c = calculations;
        const pageW = doc.internal.pageSize.getWidth();
        const margin = 18;
        const contentW = pageW - margin * 2;
        let y = margin;

        // Colors
        const dark = [15, 23, 42];
        const amber = [245, 158, 11];
        const slate400 = [148, 163, 184];
        const white = [255, 255, 255];
        const green = [52, 211, 153];
        const red = [248, 113, 113];

        // Header bar
        doc.setFillColor(...dark);
        doc.rect(0, 0, pageW, 38, 'F');
        doc.setFillColor(...amber);
        doc.rect(0, 38, pageW, 1.5, 'F');

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(20);
        doc.setTextColor(...white);
        doc.text('STR Feasibility Report', margin, 16);

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(...slate400);
        doc.text(preset.subtitle, margin, 24);

        const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        doc.text(today, margin, 31);

        // Verdict badge
        const verdictColor = c.cashOnCash >= 8 && c.capRate >= 6 ? green
          : c.cashOnCash < 0 ? red : amber;
        doc.setFontSize(9);
        doc.setTextColor(...verdictColor);
        const verdictW = doc.getTextWidth(verdict.text.toUpperCase()) + 10;
        doc.setDrawColor(...verdictColor);
        doc.roundedRect(pageW - margin - verdictW, 12, verdictW, 8, 2, 2, 'S');
        doc.text(verdict.text.toUpperCase(), pageW - margin - verdictW + 5, 17.5);

        y = 48;

        // Helper to draw section headers
        const sectionHeader = (title) => {
          if (y > 250) { doc.addPage(); y = margin; }
          doc.setFillColor(...amber);
          doc.rect(margin, y, 1.5, 7, 'F');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(12);
          doc.setTextColor(30, 41, 59);
          doc.text(title, margin + 5, y + 5.5);
          y += 12;
        };

        // Helper for key-value tables
        const kvTable = (rows) => {
          if (y > 240) { doc.addPage(); y = margin; }
          doc.autoTable({
            startY: y,

            body: rows,

              if (data.row.raw && data.row.raw._separator) {
                data.cell.styles.fillColor = [241, 245, 249];
                data.cell.styles.fontStyle = 'bold';
              }
              // Style highlight values
              if (data.column.index === 1 && data.row.raw && data.row.raw._highlight) {
                data.cell.styles.textColor = data.row.raw._highlight;
              }
            },
            willDrawCell: (data) => {
              // Draw top border for separator rows
              if (data.row.raw && data.row.raw._separator && data.column.index === 0) {
                doc.setDrawColor(203, 213, 225);
                doc.line(data.cell.x, data.cell.y, data.cell.x + contentW, data.cell.y);
              }
            }
          });
          y = doc.lastAutoTable.finalY + 8;
        };

        // --- KEY METRICS (2x2 grid) ---
        sectionHeader('Key Returns');

          ['Cash-on-Cash Return', formatPercent(c.cashOnCash)],
          ['Cap Rate', formatPercent(c.capRate)],
          ['Monthly Cash Flow', formatCurrency(c.monthlyCashFlow)],
          ['Annual Cash Flow', formatCurrency(c.annualCashFlow)]
        ];
        const boxW = (contentW - 6) / 2;
        const boxH = 18;
        for (let i = 0; i < 4; i++) {
          const col = i % 2;
          const row = Math.floor(i / 2);
          const bx = margin + col * (boxW + 6);
          const by = y + row * (boxH + 4);

          doc.setFontSize(8);
          doc.setTextColor(...slate400);
          doc.text(metrics[i][0], bx + 5, by + 6);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(14);
          doc.setTextColor(30, 41, 59);
          doc.text(metrics[i][1], bx + 5, by + 14);

        // --- INVESTMENT SUMMARY ---

          ['Total Nights Booked', Math.round(c.totalNightsBooked).toString()],

        // --- OPERATING EXPENSES ---

          ['Property Management (' + propertyMgmtPercent + '%)', formatCurrency(c.propertyManagement)],
          ['Cleaning (' + Math.round(c.numberOfTurnovers) + ' turns @ ' + formatCurrency(cleaningFeePerTurn) + ')', formatCurrency(c.totalCleaningCost)],
          ['Platform Fees (' + platformFeePercent + '%)', formatCurrency(c.platformFees)],

        // --- BOTTOM LINE ---
        sectionHeader('Bottom Line');
        kvTable([
          Object.assign(['Net Operating Income (NOI)', formatCurrency(c.noi)], { _highlight: c.noi >= 0 ? green : red }),

          ['Break-even Occupancy', formatPercent(Math.min(c.breakEvenOccupancy, 100))],

        // --- TAX STRATEGY (if material participation) ---

            ['Year 1 Paper Loss', formatCurrency(c.year1PaperIncome)],

          ]);
        }

        // Footer
        const pageCount = doc.internal.getNumberOfPages();
        for (let i = 1; i <= pageCount; i++) {

        doc.save('str-feasibility-' + regionSlug + '-' + new Date().toISOString().slice(0,10) + '.pdf');

                            <span className="text-slate-400">Bonus Depreciation</span>
                            <span className="text-purple-400 font-bold">{formatCurrency(calculations.year1BonusDepreciation)}</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-slate-400">+ Straight-Line Yr1</span>
                            <span className="text-white">{formatCurrency(calculations.annualStraightLineDepreciation)}</span>
                          </div>
                          <div className="border-t border-slate-700 pt-2 flex justify-between">
                            <span className="text-slate-300 font-medium">Total Yr1 Depreciation</span>
                            <span className="text-purple-400 font-bold">{formatCurrency(calculations.year1TotalDepreciation)}</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-slate-400">Paper Income (Loss)</span>
                            <span className={calculations.year1PaperIncome < 0 ? 'text-red-400' : 'text-emerald-400'}>{formatCurrency(calculations.year1PaperIncome)}</span>
                          </div>
                          {materialParticipation && calculations.year1TaxSavings > 0 && (
                            <div className="flex justify-between bg-emerald-500/10 -mx-2 px-2 py-1 rounded">
                              <span className="text-emerald-400">Tax Savings (W-2 offset)</span>
                              <span className="text-emerald-400 font-bold">{formatCurrency(calculations.year1TaxSavings)}</span>
                            </div>
                          )}
                        </div>
                      </div>
                      
                      <div className="bg-slate-800/30 border border-slate-700/50 rounded-xl p-5">
                        <h4 className="text-slate-300 font-medium mb-3">📈 Years 2+ (Ongoing)</h4>
                        <div className="space-y-2 text-sm">
                          <div className="flex justify-between">
                            <span className="text-slate-400">Remaining Basis</span>
                            <span className="text-white">{formatCurrency(calculations.remainingBasisAfterBonus)}</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-slate-400">Annual Depreciation</span>
                            <span className="text-white">{formatCurrency(calculations.ongoingAnnualDepreciation)}</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-slate-400">Paper Income (Loss)</span>
                            <span className={calculations.ongoingPaperIncome < 0 ? 'text-red-400' : 'text-emerald-400'}>{formatCurrency(calculations.ongoingPaperIncome)}</span>
                          </div>
                          {materialParticipation && calculations.ongoingTaxSavings > 0 && (
                            <div className="flex justify-between">
                              <span className="text-slate-400">Annual Tax Savings</span>
                              <span className="text-emerald-400">{formatCurrency(calculations.ongoingTaxSavings)}</span>
                            </div>
                          )}
                          <div className="border-t border-slate-700 pt-2 mt-2">
                            <div className="flex justify-between">
                              <span className="text-slate-300 font-medium">Effective Cash-on-Cash</span>
                              <span className="text-amber-400 font-bold">{formatPercent(calculations.ongoingEffectiveCoCReturn)}</span>
                            </div>
                            <p className="text-xs text-slate-500 mt-1">Cash flow + tax savings ÷ cash invested</p>
                          </div>
                        </div>
                      </div>
                    </div>
                    
                    <div className="mt-4 text-xs text-slate-500 bg-slate-900/50 rounded-xl p-4">
                      <strong className="text-amber-400">⚠️ Important:</strong> This is a simplified model for illustration. Actual tax benefits depend on your complete tax situation, state laws, and IRS rules. Cost segregation requires a professional study. Bonus depreciation recapture applies if you sell. <strong>Always consult a CPA experienced with STR taxation.</strong>
                    </div>
                  </div>
                )}
              </div>
            </div>
            
            {/* Results Panel */}
            <div className="space-y-4 lg:sticky lg:top-4 lg:max-h-[calc(100vh-2rem)] lg:overflow-y-auto lg:pr-1 results-scroll">
              {/* Verdict */}
              <div className={`${verdict.bg} border border-slate-700/50 rounded-2xl p-5 text-center`}>
                <div className={`text-2xl font-bold mono ${verdict.color}`}>
                  {verdict.text}
                </div>
                <div className="text-sm text-slate-400 mt-1">Based on Cash-on-Cash & Cap Rate</div>
                {marketType !== 'consolidated' && (
                  <div className="mt-2 text-xs text-amber-400">
                    ⚠️ {marketType === 'emerging' ? '10%' : '25%'} risk adjustment applied
                  </div>
                )}
              </div>
              
              {/* Key Metrics */}
              <div className="bg-slate-800/20 backdrop-blur border border-slate-700/50 rounded-2xl p-5">
                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Key Returns</h3>
                <div className="grid grid-cols-2 gap-3">
                  <MetricCard 
                    label="Cash-on-Cash" 
                    value={formatPercent(calculations.cashOnCash)}
                    subtext="Return on cash invested"
                    highlight={calculations.cashOnCash >= 8}
                    warning={calculations.cashOnCash < 0}
                  />
                  <MetricCard 
                    label="Cap Rate" 
                    value={formatPercent(calculations.capRate)}
                    subtext="NOI ÷ Purchase Price"
                    highlight={calculations.capRate >= 6}
                  />
                  <MetricCard 
                    label="Monthly Cash Flow" 
                    value={formatCurrency(calculations.monthlyCashFlow)}
                    subtext="After all expenses"
                    warning={calculations.monthlyCashFlow < 0}
                  />
                  <MetricCard 
                    label="Annual Cash Flow" 
                    value={formatCurrency(calculations.annualCashFlow)}
                    subtext="Net after debt service"
                    warning={calculations.annualCashFlow < 0}
                  />
                </div>
              </div>
              
              {/* Revenue Breakdown */}
              <div className="bg-slate-800/20 backdrop-blur border border-slate-700/50 rounded-2xl p-5">
                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Revenue Analysis</h3>
                <div className="space-y-3">
                  <div className="flex justify-between items-center">
                    <span className="text-slate-400">Gross Rental Income</span>
                    <span className="text-white font-bold">{formatCurrency(calculations.grossRentalIncome)}</span>
                  </div>
                  <div className="text-xs text-slate-500 pl-4 space-y-1">
                    <div className="flex justify-between">
                      <span>↳ High Season</span>
                      <span>{formatCurrency(calculations.highSeasonRevenue)}</span>
                    </div>
                    <div className="flex justify-between">
                      <span>↳ Shoulder Season</span>
                      <span>{formatCurrency(calculations.shoulderSeasonRevenue)}</span>
                    </div>
                    <div className="flex justify-between">
                      <span>↳ Low Season</span>
                      <span>{formatCurrency(calculations.lowSeasonRevenue)}</span>
                    </div>
                  </div>
                  <div className="border-t border-slate-700 pt-3 flex justify-between items-center">
                    <span className="text-slate-400">Blended Occupancy</span>
                    <span className="text-amber-400 font-bold">{formatPercent(calculations.blendedOccupancy)}</span>
                  </div>
                  <div className="flex justify-between items-center">
                    <span className="text-slate-400">Nights Booked</span>
                    <span className="text-white">{Math.round(calculations.totalNightsBooked)}</span>
                  </div>
                  <div className="flex justify-between items-center">
                    <span className="text-slate-400">Turnovers (for cleaning)</span>
                    <span className="text-white">{Math.round(calculations.numberOfTurnovers)}</span>
                  </div>
                </div>
              </div>
              
              {/* Expense Breakdown */}
              <div className="bg-slate-800/20 backdrop-blur border border-slate-700/50 rounded-2xl p-5">
                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Expense Breakdown</h3>
                <div className="space-y-2 text-sm">
                  <div className="flex justify-between">
                    <span className="text-slate-400">Property Management</span>
                    <span className="text-white">{formatCurrency(calculations.propertyManagement)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Cleaning</span>
                    <span className="text-white">{formatCurrency(calculations.totalCleaningCost)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Platform Fees</span>
                    <span className="text-white">{formatCurrency(calculations.platformFees)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">HOA</span>
                    <span className="text-white">{formatCurrency(calculations.hoaAnnual)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Utilities</span>
                    <span className="text-white">{formatCurrency(calculations.utilitiesAnnual)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Insurance</span>
                    <span className="text-white">{formatCurrency(insuranceAnnual)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Property Tax</span>
                    <span className="text-white">{formatCurrency(calculations.propertyTax)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Maintenance Reserve</span>
                    <span className="text-white">{formatCurrency(calculations.maintenanceReserve)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Permits & Marketing</span>
                    <span className="text-white">{formatCurrency(permitsAnnual + marketingAnnual)}</span>
                  </div>
                  <div className="border-t border-slate-700 pt-2 flex justify-between font-bold">
                    <span className="text-slate-300">Total Operating Expenses</span>
                    <span className="text-red-400">{formatCurrency(calculations.totalOperatingExpenses)}</span>
                  </div>
                  <div className="flex justify-between text-xs">
                    <span className="text-slate-500">Expense Ratio</span>
                    <span className="text-slate-400">{formatPercent(calculations.expenseRatio)} of gross</span>
                  </div>
                </div>
              </div>
              
              {/* Investment Summary */}
              <div className="bg-slate-800/20 backdrop-blur border border-slate-700/50 rounded-2xl p-5">
                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Investment Summary</h3>
                <div className="space-y-2 text-sm">
                  <div className="flex justify-between">
                    <span className="text-slate-400">Down Payment</span>
                    <span className="text-white">{formatCurrency(calculations.downPayment)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Closing Costs</span>
                    <span className="text-white">{formatCurrency(calculations.closingCosts)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Furnishing</span>
                    <span className="text-white">{formatCurrency(furnishingCost)}</span>
                  </div>
                  <div className="border-t border-slate-700 pt-2 flex justify-between font-bold">
                    <span className="text-slate-300">Total Cash Invested</span>
                    <span className="text-amber-400">{formatCurrency(calculations.totalCashInvested)}</span>
                  </div>
                  <div className="flex justify-between pt-2">
                    <span className="text-slate-400">Monthly Mortgage (P&I)</span>
                    <span className="text-white">{formatCurrency(calculations.monthlyMortgage)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">NOI (before debt)</span>
                    <span className="text-emerald-400 font-medium">{formatCurrency(calculations.noi)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Break-even Occupancy</span>
                    <span className="text-white">{formatPercent(Math.min(calculations.breakEvenOccupancy, 100))}</span>
                  </div>
                  <div className="border-t border-slate-700 pt-2 flex justify-between">
                    <span className="text-slate-400">Gross Yield</span>
                    <span className="text-white">{formatPercent(calculations.grossYield)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Net Yield</span>
                    <span className="text-white">{formatPercent(calculations.netYield)}</span>
                  </div>
                  {marketType !== 'consolidated' && (
                    <div className="border-t border-slate-700 pt-2 flex justify-between">
                      <span className="text-slate-400">Risk-Adjusted Cash Flow</span>
                      <span className={`font-medium ${calculations.adjustedCashFlow >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{formatCurrency(calculations.adjustedCashFlow)}</span>
                    </div>
                  )}
                </div>
              </div>

              {/* Tax Strategy Summary */}
              {materialParticipation && calculations.year1TaxSavings > 0 && (
                <div className="bg-gradient-to-br from-purple-500/10 to-indigo-500/5 border border-purple-500/30 rounded-2xl p-5">
                  <h3 className="text-sm font-semibold text-purple-400 uppercase tracking-wider mb-4">💰 Tax Strategy Impact</h3>
                  <div className="space-y-2 text-sm">
                    <div className="flex justify-between">
                      <span className="text-slate-400">Year 1 Tax Savings</span>
                      <span className="text-emerald-400 font-bold">{formatCurrency(calculations.year1TaxSavings)}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-400">Year 1 Effective CoC</span>
                      <span className="text-purple-400 font-bold">{formatPercent(calculations.year1EffectiveCoCReturn)}</span>
                    </div>
                    <div className="border-t border-purple-500/20 pt-2 mt-2">
                      <div className="flex justify-between">
                        <span className="text-slate-400">Ongoing Tax Savings/yr</span>
                        <span className="text-emerald-400">{formatCurrency(calculations.ongoingTaxSavings)}</span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-slate-400">Ongoing Effective CoC</span>
                        <span className="text-purple-400 font-medium">{formatPercent(calculations.ongoingEffectiveCoCReturn)}</span>
                      </div>
                    </div>
                  </div>
                  <p className="text-xs text-slate-500 mt-3">With material participation + cost seg</p>
                </div>
              )}
              
              {/* Disclaimer */}
              <div className="text-xs text-slate-500 p-4 bg-slate-900/50 rounded-xl">
                <strong className="text-slate-400">Disclaimer:</strong> This calculator provides estimates for educational purposes only. 
                Actual returns may vary. Gone are the days of 8-10% ROI—most owners now cover operating expenses with modest returns. 
                Focus on lifestyle benefits alongside investment potential. Always consult qualified professionals before investing.
              </div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<STRFeasibilityCalculator />);
  </script>
</body>
</html>
